<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    >
    <title>GoST WebAssembly App</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        background: #000;
      }
    </style>
  </head>
  <body>
    <script src="wasm_exec.js"></script>
    <script>
      const go = new Go();

      async function loadWasm() {
        const response = await fetch("gost.wasm");
        if (!response.ok) {
          throw new Error(`fetch gost.wasm: ${response.status} ${response.statusText}`);
        }

        if (WebAssembly.instantiateStreaming) {
          try {
            return await WebAssembly.instantiateStreaming(response.clone(), go.importObject);
          } catch (error) {
            console.warn("instantiateStreaming failed, falling back to ArrayBuffer", error);
          }
        }

        const bytes = await response.arrayBuffer();
        return WebAssembly.instantiate(bytes, go.importObject);
      }

      loadWasm()
        .then((result) => go.run(result.instance))
        .catch((error) => {
          console.error(error);
        });
    </script>
  </body>
</html>
