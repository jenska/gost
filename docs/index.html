<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    >
    <title>GoST WebAssembly Demo</title>
    <style>
      :root {
        color-scheme: dark;
        --panel-width: 640px;
        --panel-height: 400px;
        --panel-shadow: 0 28px 80px rgba(0, 0, 0, 0.45);
        --panel-border: rgba(123, 255, 187, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      html {
        width: 100%;
        min-height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(93, 244, 191, 0.18), transparent 28%),
          linear-gradient(180deg, rgba(7, 13, 20, 1), rgba(1, 4, 8, 1));
      }

      body {
        width: var(--panel-width) !important;
        height: var(--panel-height) !important;
        margin: 0 !important;
        padding: 0 !important;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        overflow: hidden;
        border: 1px solid var(--panel-border);
        box-shadow: var(--panel-shadow);
      }

      body::before {
        content: "GoST wasm 640x400";
        position: absolute;
        top: 10px;
        left: 12px;
        z-index: 1;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(4, 10, 15, 0.72);
        color: rgba(233, 247, 241, 0.9);
        font: 12px/1.2 "IBM Plex Mono", "SFMono-Regular", "Consolas", monospace;
        letter-spacing: 0.08em;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <script src="wasm_exec.js"></script>
    <script>
      const go = new Go();

      async function loadWasm() {
        const response = await fetch("gost.wasm");
        if (!response.ok) {
          throw new Error(`fetch gost.wasm: ${response.status} ${response.statusText}`);
        }

        if (WebAssembly.instantiateStreaming) {
          try {
            return await WebAssembly.instantiateStreaming(response.clone(), go.importObject);
          } catch (error) {
            console.warn("instantiateStreaming failed, falling back to ArrayBuffer", error);
          }
        }

        const bytes = await response.arrayBuffer();
        return WebAssembly.instantiate(bytes, go.importObject);
      }

      loadWasm()
        .then((result) => go.run(result.instance))
        .catch((error) => {
          console.error(error);
        });
    </script>
  </body>
</html>
