<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    >
    <title>GoST WebAssembly Demo</title>
    <style>
      :root {
        color-scheme: dark;
        --panel-width: 640px;
        --panel-height: 400px;
        --text: #e9f7f1;
        --muted: #a0b8af;
        --accent: #9dff7a;
        --panel-border: rgba(123, 255, 187, 0.24);
        --panel-bg: rgba(5, 11, 17, 0.82);
        --shadow: rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "IBM Plex Mono", "SFMono-Regular", "Consolas", monospace;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(93, 244, 191, 0.18), transparent 28%),
          linear-gradient(180deg, rgba(7, 13, 20, 1), rgba(1, 4, 8, 1));
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
        background-size: 100% 3px, 3px 100%;
        opacity: 0.16;
      }

      .layout {
        width: min(calc(var(--panel-width) + 48px), calc(100vw - 24px));
      }

      .frame {
        width: var(--panel-width);
        max-width: 100%;
        margin: 0 auto;
        padding: 16px;
        border: 1px solid var(--panel-border);
        border-radius: 22px;
        background: var(--panel-bg);
        box-shadow: 0 30px 80px var(--shadow);
        backdrop-filter: blur(12px);
      }

      .viewport {
        width: var(--panel-width);
        max-width: 100%;
        aspect-ratio: 16 / 10;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: #000;
        overflow: hidden;
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .caption {
        margin: 14px 4px 0;
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.5;
      }

      .caption strong {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <section class="frame">
        <div class="viewport">
          <iframe
            src="./app.html"
            title="GoST emulator"
            allow="fullscreen"
            loading="eager"
          ></iframe>
        </div>
        <p class="caption">
          <strong>640x400 at scale 1.</strong> Click inside the panel to focus
          keyboard and mouse input.
        </p>
      </section>
    </main>
  </body>
</html>
